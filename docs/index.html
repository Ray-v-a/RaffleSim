<!DOCTYPE html> 

<html lang="en">
<head>
   <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raffle winners</title>
  <style>
    :root {

      --bg: #f4f6f9;
      --panel: #ffffff;
      --primary: #1d7a73;
      --primary-hover: #165f5a;
      --accent: #edf7f6;
      --text: #22354d;
      --muted: #667788;
      --border: #d8e1ea;
      --radius: 18px;
      --title-bg: linear-gradient(135deg, #edf3fb, #f8fbff);
      --nav-bg: rgba(255, 255, 255, 0.88);
      --slider-track: #d7e3ea;
      --slider-fill: #1d7a73;
    }

    * {
      box-sizing: border-box;
    }

      --bg: #f7f7f8;
      --panel: #ffffff;
      --border: #d9d9e3;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --radius: 10px;
    }

    * { box-sizing: border-box; }


    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

      background: linear-gradient(180deg, #f7f9fc 0%, #eef3f8 100%);
      color: var(--text);
      line-height: 1.5;
      padding-bottom: 60px;
    }


    main {
      max-width: 1100px;
      margin: 28px auto 0;
      padding: 0 20px;
      font-family: inherit;
    }

    .app-card {
      background: white;
      padding: 40px;
      border-radius: 22px;
      border: 1px solid var(--border);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
    }

    .title-banner {
      background: var(--title-bg);
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 25px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 20px rgba(15, 35, 70, 0.05);
    }

    .title-banner h1 {
      margin: 0;
      font-size: 46px;
      color: #17345b;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .intro {
      margin-top: 12px;
      margin-bottom: 24px;
      color: var(--muted);
      max-width: 900px;
      font-size: 18px;

      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    main {
      max-width: 960px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .app-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 2rem;
      line-height: 1.2;
    }



    .control-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }




    input[type="range"] {
      width: 100%;
      cursor: pointer;

      accent-color: var(--primary);
    }

    .range-value {
      font-size: 0.95rem;
      color: var(--muted);
    }

    textarea,
    output {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      border-radius: var(--radius);
      padding: 12px;
      font: inherit;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 76px;
    }

    button {
      background: var(--primary);
      border: none;
      padding: 14px 28px;
      border-radius: 14px;
      color: white;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    button:hover,
    button:focus-visible {
      background: var(--primary-hover);
      transform: translateY(-2px);
      outline: none;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      transform: none;

      border: none;
      border-radius: var(--radius);
      background: var(--primary);
      color: white;
      padding: 12px 18px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    button:hover { background: var(--primary-hover); }
    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;

    }

    .output-section {
      margin-top: 28px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;

      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .output-section h2 {
      margin: 0;
      color: #0f2346;
      font-size: 1.45rem;
      border-bottom: 2px solid #dbe3ea;
      padding-bottom: 8px;

    }

    #result-output {
      min-height: 96px;
      white-space: pre-wrap;
      display: block;
      color: var(--text);
    }


    code {
      background: #eef2ff;
      color: #3730a3;
      padding: 2px 5px;
      border-radius: 4px;
    }

      .control-row {
        grid-template-columns: 1fr;
      }

      main {
        margin-top: 18px;
      }

      .control-row { grid-template-columns: 1fr; }
      main { margin: 24px auto; }
      .app-card { padding: 20px; }
    }
  </style>

</head>
<body>
  <main>
<form id= "raffle_form">
  <div class="field">
          <label for="entries-input">Number of entries</label>
          <input
            type="number"
            id="entries-input"
            name="number_entries"
            rows="2"
            placeholder="Enter the number of entries"
          />
        </div>
  <div class="field">
          <label for="number-winners-input">Number of winners</label>
          <input
            type="number"
            id="number-winners-input"
            name="number_winners"
            rows="2"
            placeholder="Enter the number of winners"
          />
        </div>
   <button id="get-winners-button" type="button" py-click="get_winners">
          Get winners
        </button>
</form>
<section class="output-section" aria-labelledby="outputs-title">
        <h2 id="outputs-title">Outputs</h2>

        <div class="field">
          <label for="result-output">Result</label>
          <output id="result-output" name="winner_result">
            Results will appear here after computation.
          </output>
        </div>
</section>
  </main>
   <script type="py" src="./raffle-winners.py" config="./pyscript.json"></script>
</body>
</html>
